services:
  redis:
    image: redis:alpine
    command: redis-server --requirepass zakEfron1
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=zakEfron1
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    depends_on:
      - redis
      - instloader
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=DEBUG
      - METRICS_SERVER_ADDR=:9091

  instloader:
    build:
      context: .
      dockerfile: docker/instloader.Dockerfile
    env_file:
      - .env
    environment:
      # Writable session in volume; optional read-only import from ./secrets/session.json
      - INSTAGRAM_SESSION_FILE=/data/session.json
    ports:
      - "8003:8003"
    volumes:
      # Session + runtime data (writable; login saves /data/session.json here)
      - instloader-data:/data
      # Optional host session — mount a directory, NOT ./session.json directly.
      # If the host path is missing, Docker creates session.json as a directory and the container fails to start.
      - ./secrets:/secrets:ro

  loki:
    image: grafana/loki:3.4.2
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  redis-data:
  instloader-data:
  loki-data:
  grafana-data:
